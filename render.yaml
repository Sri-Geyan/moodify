services:
  - type: web
    name: moodify-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        # IMPORTANT: Once deployed, update this to your Render URL (e.g., https://moodify-api.onrender.com/auth/callback)
        sync: false
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: GENIUS_ACCESS_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        # Point to itself since we are serving frontend through FastAPI
        value: "http://localhost:5173"
